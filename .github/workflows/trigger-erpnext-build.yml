name: Trigger ERPNext Rebuild

on:
  push:
    branches: [main]
    paths:
      - '**/*.css'
      - '**/*.js'
      - '**/*.html'
      - '**/*.json'
      - '**/*.py'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger argocd build
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.ARGOCD_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AyoubDahir/argocd/dispatches \
            -d '{"event_type":"theme-updated"}'
          echo "Triggered ERPNext rebuild"
